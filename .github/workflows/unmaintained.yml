name: Cargo unmaintained

on:
  push:
    branches: [main, dev]
    paths:
      - 'Cargo.toml'
  pull_request:
    branches: [main, dev]
    types: [opened, reopened, synchronize]
    paths:
      - 'Cargo.toml'
jobs:
  cargo-unmaintained:
    name: Run cargo unmaintained
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Install cargo unmaintained
        run: cargo install cargo-unmaintained
      - name: Run cargo unmaintained
        run: |
          # Known exceptions:
          # - bincode v1: repo archived but crate is stable, widely used, and
          #   pinned behind the optional "serde" feature gate.
          EXCEPTIONS="bincode"
          OUTPUT=$(cargo unmaintained 2>&1) || true
          # Filter out accepted exceptions and check if anything remains
          echo "$OUTPUT"
          # Strip ANSI escape codes, then filter out non-finding lines and known exceptions
          FILTERED=$(echo "$OUTPUT" \
            | sed 's/\x1b\[[0-9;]*m//g' \
            | grep -v '^\s*$' \
            | grep -vE '^(warning:|Scanning |\*|Error:)' \
            | grep -vE "^($(echo $EXCEPTIONS | tr ' ' '|'))\b" \
            || true)
          if [ -n "$FILTERED" ]; then
            echo "::error::Unmaintained packages found (beyond known exceptions):"
            echo "$FILTERED"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
