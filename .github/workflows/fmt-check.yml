name: Cargo fmt

on:
  push:
    branches: [main, dev]
    paths:
      - '**/*.rs'
  pull_request:
    branches: [main, dev]
    types: [opened, reopened, synchronize]
    paths:
      - '**/*.rs'
jobs:
  cargo-fmt:
    name: Run cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - run: cargo fmt --all --check
