name: Cargo clippy

on:
  push:
    branches: [main, dev]
    paths:
      - '**/*.rs'
  pull_request:
    branches: [main, dev]
    types: [opened, reopened, synchronize]
    paths:
      - '**/*.rs'
jobs:
  clippy:
    name: Run cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - run: cargo clippy --workspace --all-targets
